<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Book a Session | LensCraft Studio</title>

    <link rel="icon" type="image/png" href="images/logo.png">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">

</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark fixed-top">

    <div class="container">

        <a class="navbar-brand d-flex align-items-center fw-bold" href="index.html">
            <img src="images/logo.png"
                 alt="LensCraft Studio Logo"
                 width="45"
                 height="45"
                 class="me-2">
            <span>LensCraft Studio</span>
        </a>

        <button class="navbar-toggler"
                type="button"
                data-bs-toggle="collapse"
                data-bs-target="#navbarNav"
                aria-controls="navbarNav"
                aria-expanded="false"
                aria-label="Toggle navigation">

            <span class="navbar-toggler-icon"></span>

        </button>

        <div class="collapse navbar-collapse" id="navbarNav">

            <ul class="navbar-nav mx-auto">

                <li class="nav-item">
                    <a class="nav-link" href="index.html">Home</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="gallery.html">Gallery</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="packages.html">Packages</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="about.html">About</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="contact.html">Contact</a>
                </li>

            </ul>

            <a href="booking.html" class="btn btn-warning px-4">
                Book Session
            </a>

        </div>

    </div>

</nav>

<section class="py-5 mt-5">

    <div class="container">

        <div class="row justify-content-center">

            <div class="col-lg-8">

                <div class="package-card">

                    <h1 class="text-center mb-4">
                        Book Your Photography Session
                    </h1>

                    <form id="bookingForm">

                        <div class="row">

                            <div class="col-md-6 mb-3">
                                <label class="form-label">Full Name</label>
                                <input
                                    type="text"
                                    class="form-control"
                                    id="name"
                                    placeholder="Enter your full name"
                                    required>
                            </div>

                            <div class="col-md-6 mb-3">
                                <label class="form-label">Email Address</label>
                                <input
                                    type="email"
                                    class="form-control"
                                    id="email"
                                    placeholder="Enter your email"
                                    required>
                            </div>

                        </div>

                        <div class="row">

                            <div class="col-md-6 mb-3">
                                <label class="form-label">Phone Number</label>
                                <input
                                    type="tel"
                                    class="form-control"
                                    id="phone"
                                    placeholder="Enter your phone number"
                                    required>
                            </div>

                            <div class="col-md-6 mb-3">
                                <label class="form-label">Select Package</label>

                                <select
                                    class="form-select"
                                    id="package"
                                    required>

                                    <option value="">Choose a Package</option>
                                    <option value="Basic">Basic</option>
                                    <option value="Premium">Premium</option>
                                    <option value="Luxury">Luxury</option>

                                </select>

                            </div>

                        </div>

                        <div class="row">

                            <div class="col-md-6 mb-3">
                                <label class="form-label">Booking Date</label>
                                <input
                                    type="date"
                                    class="form-control"
                                    id="date"
                                    required>
                            </div>

                            <div class="col-md-6 mb-3">
                                <label class="form-label">Preferred Time</label>
                                <input
                                    type="time"
                                    class="form-control"
                                    id="time"
                                    required>
                            </div>

                        </div>

                        <div class="mb-3">

                            <label class="form-label">
                                Additional Requirements
                            </label>

                            <textarea
                                class="form-control"
                                id="message"
                                rows="5"
                                placeholder="Tell us about your photography requirements"></textarea>

                        </div>

                        <button
                            type="submit"
                            class="btn btn-warning w-100">

                            Book Now

                        </button>

                    </form>

                </div>

            </div>

        </div>

    </div>

</section>

<footer class="py-4">

    <div class="container text-center">

        <h4>LensCraft Studio</h4>

        <p>Capturing Moments, Creating Memories.</p>

        <p>Email: info@lenscraftstudio.com</p>

        <p>Phone: +91 9876543210</p>

        <p>© 2026 LensCraft Studio. All Rights Reserved.</p>

    </div>

</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/script.js"></script>

<script>

document.getElementById("bookingForm").addEventListener("submit", async function(e){

    e.preventDefault();

    const booking = {
        name: document.getElementById("name").value,
        email: document.getElementById("email").value,
        phone: document.getElementById("phone").value,
        package: document.getElementById("package").value,
        date: document.getElementById("date").value,
        time: document.getElementById("time").value,
        message: document.getElementById("message").value
    };

    try{

        const response = await fetch("https://lenscraft-studio-fnao.onrender.com/api/booking",{

            method:"POST",

            headers:{
                "Content-Type":"application/json"
            },

            body:JSON.stringify(booking)

        });

        const data = await response.json();

        if (response.ok) {

    alert(data.message);

    document.getElementById("bookingForm").reset();

} else {

    alert(data.message);

}

    }

    catch(error){

        alert("Unable to connect to the server.");

        console.log(error);

    }

});

</script>

</body>

</html>
